[tasks.release]
description = "Publish a skill then pull all loom skills — usage: mise run release <name> '<message>'"
run = """
#!/usr/bin/env bash
set -euo pipefail
name="${1:?Usage: mise run release <name> '<commit message>'}"
msg="${2:?Usage: mise run release <name> '<commit message>'}"
mise run check
mise run publish "$name" "$msg"
mise run pull
"""
